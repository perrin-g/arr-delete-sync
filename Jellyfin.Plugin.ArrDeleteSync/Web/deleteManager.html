<!-- Web/deleteManager.html -->
<!DOCTYPE html>
<html>
<head><title>Delete Manager</title></head>
<body>
  <div id="ArrDeleteSyncManagerPage" data-role="page" class="page type-interior">
    <div data-role="content">
      <div class="content-primary">
        <h1>Delete Manager</h1>

        <div class="verticalSection">
          <div style="display:flex; gap:0.5em;">
            <button is="emby-button" type="button" class="raised button-submit" id="MoviesTabButton" style="flex:1; font-size:1.2em; padding:0.75em;">Movies</button>
            <button is="emby-button" type="button" class="raised" id="TvTabButton" style="flex:1; font-size:1.2em; padding:0.75em;">TV</button>
          </div>

          <div id="MoviesTab">
            <input is="emby-input" type="text" id="MoviesFilter" label="Filter movies" />
            <div id="MoviesList"></div>
            <div style="display:flex; align-items:center; gap:1em; margin-top:0.5em;">
              <button is="emby-button" type="button" class="raised" id="MoviesPrevPage">Prev</button>
              <span id="MoviesPageLabel"></span>
              <button is="emby-button" type="button" class="raised" id="MoviesNextPage">Next</button>
              <select is="emby-select" id="MoviesPageSize" label="Per page">
                <option value="25">25 per page</option>
                <option value="50">50 per page</option>
                <option value="100">100 per page</option>
              </select>
            </div>
          </div>

          <div id="TvTab" style="display:none">
            <input is="emby-input" type="text" id="TvFilter" label="Filter series" />
            <div id="TvList"></div>
            <div style="display:flex; align-items:center; gap:1em; margin-top:0.5em;">
              <button is="emby-button" type="button" class="raised" id="TvPrevPage">Prev</button>
              <span id="TvPageLabel"></span>
              <button is="emby-button" type="button" class="raised" id="TvNextPage">Next</button>
              <select is="emby-select" id="TvPageSize" label="Per page">
                <option value="25">25 per page</option>
                <option value="50">50 per page</option>
                <option value="100">100 per page</option>
              </select>
            </div>
          </div>
        </div>

        <div id="SelectionBar" class="verticalSection" style="display:none">
          <button is="emby-button" type="button" class="raised button-submit" id="DeleteSelectedButton">Delete Selected (0)</button>
        </div>

        <div id="BulkConfirmSection" class="verticalSection" style="display:none">
          <h2>Confirm delete</h2>
          <div id="SafeItemsList"></div>
          <button is="emby-button" type="button" class="raised button-delete" id="DeleteSafeItemsButton" style="display:none">Delete safe items</button>
          <div id="NeedsConfirmationList"></div>
          <button is="emby-button" type="button" class="raised" id="CancelBulkButton">Cancel</button>
        </div>

        <div id="BulkResultsSection" class="verticalSection" style="display:none">
          <h2>Results</h2>
          <p id="BulkInProgressWarning" style="color: orange;">Don't navigate away while this is in progress — there is no way to resume a partially-completed batch.</p>
          <div id="BulkResultsList"></div>
        </div>

        <div id="BreakerBanner" class="verticalSection" style="display:none; color: red;">
          Circuit breaker tripped — deletes are disabled until an admin resets it in Settings.
        </div>

        <div class="verticalSection">
          <h2>Retry Queue</h2>
          <div id="RetryQueueList"></div>
        </div>

        <div class="verticalSection">
          <h2>Audit Log</h2>
          <div id="AuditLogList"></div>
          <div style="display:flex; align-items:center; gap:1em; margin-top:0.5em;">
            <button is="emby-button" type="button" class="raised" id="AuditLogPrevPage">Prev</button>
            <span id="AuditLogPageLabel"></span>
            <button is="emby-button" type="button" class="raised" id="AuditLogNextPage">Next</button>
          </div>
        </div>
      </div>
    </div>
    <!-- MUST be nested inside the data-role="page" div, not a sibling after it (and inline,
         not an external <script src>). Jellyfin's client-side page loader (viewContainer.js)
         extracts this page via wrapper.querySelector('div[data-role="page"]') and discards
         everything outside that element's subtree; an external src is also resolved against
         the SPA shell's own URL (/web/), not this plugin's resource endpoint, and 404s.
         Found via live staging verification — the page rendered but none of its behavior
         (search, delete, retry queue, audit log) ever ran. Root-caused by reading jellyfin-web's
         actual viewContainer.js/normalizeNewView/parseHtml source; fixed by inlining directly,
         matching configPage.html's same fix. -->
    <script type="text/javascript">
      (function () {
        var breakerTripped = false; // best-effort, reactive only — see note below

        var selectedItems = {}; // keyed by Jellyfin item Id: { id, name, type, granularity, ancestorIds }
        var allMovies = [];
        var allSeries = [];
        var currentTab = "movies"; // "movies" | "tv"

        var moviesPage = 1;
        var moviesPageSize = 25;
        var tvPage = 1;
        var tvPageSize = 25;

        var auditLogPage = 1;
        var AUDIT_LOG_PAGE_SIZE = 25; // hard limit, no user-facing size control

        function renderPaginationControls(prefix, page, pageSize, totalItems) {
          var totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
          document.getElementById(prefix + "PageLabel").textContent = "Page " + page + " of " + totalPages + " (" + totalItems + " total)";
          document.getElementById(prefix + "PrevPage").disabled = page <= 1;
          document.getElementById(prefix + "NextPage").disabled = page >= totalPages;
        }

        var seasonsCache = {}; // Jellyfin series Id -> array of season items (fetched once, kept forever)
        var episodesCache = {}; // Jellyfin season Id -> array of episode items (fetched once, kept forever)
        var expandedNodes = {}; // Jellyfin series/season Id -> true if currently expanded (visibility only)

        function updateSelectionBar() {
          var count = Object.keys(selectedItems).length;
          var bar = document.getElementById("SelectionBar");
          var btn = document.getElementById("DeleteSelectedButton");
          if (count === 0) {
            bar.style.display = "none";
          } else {
            bar.style.display = "block";
            btn.textContent = "Delete Selected (" + count + ")";
          }
        }

        function rerenderCurrentTab() {
          if (currentTab === "movies") {
            renderMoviesList(document.getElementById("MoviesFilter").value);
          } else {
            renderTvList(document.getElementById("TvFilter").value);
          }
        }

        function toggleSelection(item, granularity, ancestorIds) {
          if (selectedItems[item.Id]) {
            delete selectedItems[item.Id];
          } else {
            // A parent selection supersedes any already-selected descendants — clear them.
            Object.keys(selectedItems).forEach(function (id) {
              if (selectedItems[id].ancestorIds.indexOf(item.Id) !== -1) {
                delete selectedItems[id];
              }
            });
            selectedItems[item.Id] = { id: item.Id, name: item.Name, type: item.Type, granularity: granularity, ancestorIds: ancestorIds || [] };
          }
          updateSelectionBar();
          rerenderCurrentTab();
        }

        // True if any ancestor of this item (per ancestorIds) is currently selected —
        // used to grey out a child checkbox once its parent is selected.
        function isDisabledByAncestor(ancestorIds) {
          return (ancestorIds || []).some(function (id) { return !!selectedItems[id]; });
        }

        // True if any currently-tracked selection is a descendant of this item —
        // used to grey out a parent checkbox once one of its children is selected.
        function isDisabledByDescendant(itemId) {
          return Object.keys(selectedItems).some(function (id) {
            return selectedItems[id].ancestorIds.indexOf(itemId) !== -1;
          });
        }

        function makeCheckboxRow(item, granularity, ancestorIds) {
          var row = document.createElement("div");
          var checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = !!selectedItems[item.Id];
          checkbox.disabled = isDisabledByAncestor(ancestorIds) || isDisabledByDescendant(item.Id);
          checkbox.onchange = function () {
            toggleSelection(item, granularity, ancestorIds);
          };
          var label = document.createElement("span");
          label.textContent = " " + item.Name;
          row.appendChild(checkbox);
          row.appendChild(label);
          return row;
        }

        function loadMoviesTab() {
          moviesPage = 1;
          ApiClient.getItems(ApiClient.getCurrentUserId(), {
            IncludeItemTypes: "Movie",
            Recursive: true
          }).then(function (result) {
            allMovies = (result && result.Items) || [];
            renderMoviesList(document.getElementById("MoviesFilter").value);
          }).catch(function (err) {
            console.error(err);
            Dashboard.alert("Request failed: " + (err.message || "see browser console for details"));
          });
        }

        function renderMoviesList(filterText) {
          var list = document.getElementById("MoviesList");
          list.innerHTML = "";
          var filter = (filterText || "").toLowerCase();
          var filtered = allMovies.filter(function (item) { return item.Name.toLowerCase().indexOf(filter) !== -1; });
          var totalPages = Math.max(1, Math.ceil(filtered.length / moviesPageSize));
          moviesPage = Math.min(Math.max(moviesPage, 1), totalPages);
          var start = (moviesPage - 1) * moviesPageSize;
          filtered.slice(start, start + moviesPageSize).forEach(function (item) {
            list.appendChild(makeCheckboxRow(item, "Movie", []));
          });
          renderPaginationControls("Movies", moviesPage, moviesPageSize, filtered.length);
        }

        function loadTvTab() {
          // Reset the accordion caches/visibility on every page view, matching the fresh-data
          // guarantee allSeries already gets below — otherwise stale season/episode data (or
          // stale expanded state) could survive a navigate-away-and-back even though the
          // top-level series list itself is re-fetched.
          seasonsCache = {};
          episodesCache = {};
          expandedNodes = {};
          tvPage = 1;
          ApiClient.getItems(ApiClient.getCurrentUserId(), {
            IncludeItemTypes: "Series",
            Recursive: true
          }).then(function (result) {
            allSeries = (result && result.Items) || [];
            renderTvList(document.getElementById("TvFilter").value);
          }).catch(function (err) {
            console.error(err);
            Dashboard.alert("Request failed: " + (err.message || "see browser console for details"));
          });
        }

        // Pagination applies to top-level series only — an expanded series' seasons/episodes
        // always render in full underneath it, regardless of page size, since they're not
        // separately counted/paged items.
        function renderTvList(filterText) {
          var list = document.getElementById("TvList");
          list.innerHTML = "";
          var filter = (filterText || "").toLowerCase();
          var filtered = allSeries.filter(function (item) { return item.Name.toLowerCase().indexOf(filter) !== -1; });
          var totalPages = Math.max(1, Math.ceil(filtered.length / tvPageSize));
          tvPage = Math.min(Math.max(tvPage, 1), totalPages);
          var start = (tvPage - 1) * tvPageSize;
          filtered.slice(start, start + tvPageSize).forEach(function (series) {
            list.appendChild(makeSeriesRow(series));
            if (expandedNodes[series.Id] && seasonsCache[series.Id]) {
              seasonsCache[series.Id].forEach(function (season) {
                list.appendChild(makeSeasonRow(season, series.Id));
                if (expandedNodes[season.Id] && episodesCache[season.Id]) {
                  episodesCache[season.Id].forEach(function (episode) {
                    list.appendChild(makeEpisodeRow(episode, series.Id, season.Id));
                  });
                }
              });
            }
          });
          renderPaginationControls("Tv", tvPage, tvPageSize, filtered.length);
        }

        function makeSeriesRow(series) {
          var row = makeCheckboxRow(series, "Series", []);
          var expandBtn = document.createElement("button");
          expandBtn.textContent = expandedNodes[series.Id] ? "▾" : "▸";
          expandBtn.onclick = function () {
            if (expandedNodes[series.Id]) {
              expandedNodes[series.Id] = false;
              renderTvList(document.getElementById("TvFilter").value);
            } else if (seasonsCache[series.Id]) {
              expandedNodes[series.Id] = true;
              renderTvList(document.getElementById("TvFilter").value);
            } else {
              ApiClient.ajax({
                type: "GET",
                url: ApiClient.getUrl("Shows/" + series.Id + "/Seasons"),
                dataType: "json"
              }).then(function (result) {
                seasonsCache[series.Id] = (result && result.Items) || [];
                expandedNodes[series.Id] = true;
                renderTvList(document.getElementById("TvFilter").value);
              }).catch(function (err) {
                console.error(err);
                Dashboard.alert("Request failed: " + (err.message || "see browser console for details"));
              });
            }
          };
          row.insertBefore(expandBtn, row.firstChild);
          return row;
        }

        function makeSeasonRow(season, seriesId) {
          var row = makeCheckboxRow(season, "Season", [seriesId]);
          var expandBtn = document.createElement("button");
          expandBtn.textContent = expandedNodes[season.Id] ? "▾" : "▸";
          expandBtn.onclick = function () {
            if (expandedNodes[season.Id]) {
              expandedNodes[season.Id] = false;
              renderTvList(document.getElementById("TvFilter").value);
            } else if (episodesCache[season.Id]) {
              expandedNodes[season.Id] = true;
              renderTvList(document.getElementById("TvFilter").value);
            } else {
              ApiClient.ajax({
                type: "GET",
                url: ApiClient.getUrl("Shows/" + seriesId + "/Episodes", { seasonId: season.Id }),
                dataType: "json"
              }).then(function (result) {
                episodesCache[season.Id] = (result && result.Items) || [];
                expandedNodes[season.Id] = true;
                renderTvList(document.getElementById("TvFilter").value);
              }).catch(function (err) {
                console.error(err);
                Dashboard.alert("Request failed: " + (err.message || "see browser console for details"));
              });
            }
          };
          row.insertBefore(expandBtn, row.firstChild);
          row.style.marginLeft = "1.5em";
          return row;
        }

        function makeEpisodeRow(episode, seriesId, seasonId) {
          var row = makeCheckboxRow(episode, "Episode", [seriesId, seasonId]);
          row.style.marginLeft = "3em";
          return row;
        }

        function fetchJson(path, options) {
          return ApiClient.ajax(Object.assign({ url: ApiClient.getUrl("ArrDeleteSync/" + path), dataType: "json" }, options || {}));
        }

        // Server stores/serves timestamps as UTC; render them in the viewing browser's own
        // timezone rather than a fixed zone, since admins may view this page from anywhere.
        function formatTimestamp(utcString) {
          var parsed = new Date(utcString);
          return isNaN(parsed.getTime()) ? utcString : parsed.toLocaleString();
        }

        function needsTypedConfirmation(granularity, resolution) {
          return !resolution.HasUsableProviderId || granularity === "Series" || granularity === "Season";
        }

        var confirmedSafeItems = [];

        function openBulkConfirm() {
          if (breakerTripped) {
            document.getElementById("BreakerBanner").style.display = "block";
            Dashboard.alert("Deletes are disabled until an admin resets the circuit breaker in Settings.");
            return;
          }

          var items = Object.keys(selectedItems).map(function (id) { return selectedItems[id]; });
          var resolvedCount = 0;
          var safeItems = [];
          var needsConfirmationItems = [];

          items.forEach(function (item) {
            fetchJson("resolve?itemId=" + item.id + "&granularity=" + item.granularity).then(function (resolution) {
              item.resolution = resolution;
              if (needsTypedConfirmation(item.granularity, resolution)) {
                needsConfirmationItems.push(item);
              } else {
                safeItems.push(item);
              }
              resolvedCount++;
              if (resolvedCount === items.length) {
                renderBulkConfirm(safeItems, needsConfirmationItems);
              }
            }).catch(function (err) {
              console.error(err);
              Dashboard.alert("Request failed: " + (err.message || "see browser console for details"));
              // Dropped from the batch — no resolution object to classify it with, so it goes
              // into neither safeItems nor needsConfirmationItems. Still counts toward
              // resolvedCount so a single failure can't hang the rest of the batch forever.
              resolvedCount++;
              if (resolvedCount === items.length) {
                renderBulkConfirm(safeItems, needsConfirmationItems);
              }
            });
          });
        }

        function renderBulkConfirm(safeItems, needsConfirmationItems) {
          confirmedSafeItems = safeItems;

          var safeList = document.getElementById("SafeItemsList");
          safeList.innerHTML = "";
          safeItems.forEach(function (item) {
            var row = document.createElement("div");
            row.textContent = item.name + " (" + item.granularity + ")";
            safeList.appendChild(row);
          });
          var safeBtn = document.getElementById("DeleteSafeItemsButton");
          safeBtn.style.display = safeItems.length > 0 ? "block" : "none";
          safeBtn.textContent = "Delete " + safeItems.length + " safe item(s)";

          var needsList = document.getElementById("NeedsConfirmationList");
          needsList.innerHTML = "";
          needsConfirmationItems.forEach(function (item) {
            var row = document.createElement("div");

            var reasonText = !item.resolution.HasUsableProviderId
              ? "Not identified in Jellyfin (no usable provider ID). Force-deleting will remove the file WITHOUT syncing arr/Seerr."
              : "Deleting " + item.granularity + "-level items is irreversible — recovery requires re-requesting through Seerr.";
            var reasonEl = document.createElement("div");
            reasonEl.textContent = item.name + ": " + reasonText;
            row.appendChild(reasonEl);

            var input = document.createElement("input");
            input.type = "text";
            input.placeholder = "Type the item name to confirm";
            row.appendChild(input);

            var confirmBtn = document.createElement("button");
            confirmBtn.setAttribute("is", "emby-button");
            confirmBtn.className = "raised button-delete";
            confirmBtn.textContent = "Delete";
            confirmBtn.disabled = true;
            input.oninput = function () {
              confirmBtn.disabled = input.value.trim() !== item.name.trim();
            };
            confirmBtn.onclick = function () {
              runDeleteBatch([item]);
            };
            row.appendChild(confirmBtn);

            needsList.appendChild(row);
          });

          document.getElementById("BulkConfirmSection").style.display = "block";
        }

        function runDeleteBatch(items) {
          document.getElementById("BulkConfirmSection").style.display = "none";
          var resultsSection = document.getElementById("BulkResultsSection");
          var resultsList = document.getElementById("BulkResultsList");
          resultsList.innerHTML = "";
          resultsSection.style.display = "block";
          document.getElementById("BulkInProgressWarning").style.display = "block";

          var rows = {};
          items.forEach(function (item) {
            var row = document.createElement("div");
            row.textContent = item.name + ": Pending";
            resultsList.appendChild(row);
            rows[item.id] = row;
          });

          var index = 0;
          var stoppedByBreaker = false;

          function runNext() {
            if (index >= items.length) {
              // Batch finished: clear delivered selections and refresh everything that
              // could have changed (lists, retry queue, audit log).
              document.getElementById("BulkInProgressWarning").style.display = "none";
              items.forEach(function (item) { delete selectedItems[item.id]; });
              updateSelectionBar();
              loadMoviesTab();
              loadTvTab();
              refreshRetryQueue();
              refreshAuditLog();
              return;
            }

            var item = items[index];

            if (stoppedByBreaker) {
              rows[item.id].textContent = item.name + ": Skipped — circuit breaker tripped";
              index++;
              runNext();
              return;
            }

            fetchJson("delete", {
              type: "POST",
              contentType: "application/json",
              data: JSON.stringify({
                jellyfinItemId: item.id,
                granularity: item.granularity,
                force: !item.resolution.HasUsableProviderId
              })
            }).then(function (outcome) {
              if (outcome.BlockedReason && outcome.BlockedReason.indexOf("Circuit breaker") !== -1) {
                breakerTripped = true;
                stoppedByBreaker = true;
                document.getElementById("BreakerBanner").style.display = "block";
                rows[item.id].textContent = item.name + ": Blocked — " + outcome.BlockedReason;
              } else if (outcome.BlockedReason) {
                rows[item.id].textContent = item.name + ": Blocked — " + outcome.BlockedReason;
              } else if (outcome.QueuedForRetry) {
                rows[item.id].textContent = item.name + ": Queued for retry";
              } else if (outcome.JellyfinCleanedUp === false) {
                rows[item.id].textContent = item.name + ": Cleanup failed — check Audit Log for details";
              } else {
                var text = item.name + ": Deleted";
                if (outcome.RequiresManualFileCleanup) {
                  text += outcome.FilePath
                    ? " (file NOT deleted — remove manually at: " + outcome.FilePath + ")"
                    : " (file NOT deleted — path unknown, check the library folder manually)";
                }
                rows[item.id].textContent = text;
              }
              index++;
              runNext();
            }).catch(function (err) {
              rows[item.id].textContent = item.name + ": Request failed — " + (err.message || "see browser console for details");
              index++;
              runNext();
            });
          }

          runNext();
        }

        function refreshRetryQueue() {
          fetchJson("retry-queue").then(function (entries) {
            var list = document.getElementById("RetryQueueList");
            list.innerHTML = "";
            entries.forEach(function (entry) {
              var row = document.createElement("div");
              row.textContent = entry.JellyfinItemId + " — attempts: " + entry.AttemptCount + " — last error: " + (entry.LastError || "") +
                (entry.MaxAttemptsExceeded ? " — MAX RETRY ATTEMPTS EXCEEDED, manual action required" : "");
              var retryBtn = document.createElement("button");
              retryBtn.setAttribute("is", "emby-button");
              retryBtn.className = "raised";
              retryBtn.textContent = "Retry now";
              retryBtn.onclick = function () {
                fetchJson("retry-queue/" + entry.Id + "/retry", { type: "POST" }).then(refreshRetryQueue).catch(function (err) {
                  console.error(err);
                  Dashboard.alert("Request failed: " + (err.message || "see browser console for details"));
                });
              };
              var dismissBtn = document.createElement("button");
              dismissBtn.setAttribute("is", "emby-button");
              dismissBtn.className = "raised";
              dismissBtn.textContent = "Give up";
              dismissBtn.onclick = function () {
                // Field names reflect the corrected architecture: *arr now owns file deletion, so
                // "ArrDeleteStatus === Succeeded" means the file is already gone; Jellyfin's role is
                // catalog-only cleanup ("JellyfinCleanupStatus"), not an "untrack" step.
                if (entry.ArrDeleteStatus === "Succeeded" &&
                    (entry.JellyfinCleanupStatus !== "Succeeded" || entry.SeerrUpdateStatus !== "Succeeded")) {
                  if (!confirm("The file is already deleted but arr/Seerr sync is incomplete — arr may re-download this. Give up anyway?")) {
                    return;
                  }
                }
                fetchJson("retry-queue/" + entry.Id + "/dismiss", { type: "POST" }).then(refreshRetryQueue).catch(function (err) {
                  console.error(err);
                  Dashboard.alert("Request failed: " + (err.message || "see browser console for details"));
                });
              };
              row.appendChild(retryBtn);
              row.appendChild(dismissBtn);
              list.appendChild(row);
            });
          }).catch(function (err) {
            console.error(err);
            Dashboard.alert("Request failed: " + (err.message || "see browser console for details"));
          });
        }

        var auditLogEntries = []; // newest-first; re-fetched on refreshAuditLog(), paged client-side

        function refreshAuditLog() {
          fetchJson("audit-log").then(function (entries) {
            auditLogEntries = entries.slice().reverse();
            auditLogPage = 1; // a fresh fetch (e.g. right after a delete) should surface the newest entries
            renderAuditLogPage();
          }).catch(function (err) {
            console.error(err);
            Dashboard.alert("Request failed: " + (err.message || "see browser console for details"));
          });
        }

        function renderAuditLogPage() {
          var list = document.getElementById("AuditLogList");
          list.innerHTML = "";
          var totalPages = Math.max(1, Math.ceil(auditLogEntries.length / AUDIT_LOG_PAGE_SIZE));
          auditLogPage = Math.min(Math.max(auditLogPage, 1), totalPages);
          var start = (auditLogPage - 1) * AUDIT_LOG_PAGE_SIZE;
          auditLogEntries.slice(start, start + AUDIT_LOG_PAGE_SIZE).forEach(function (entry) {
            var row = document.createElement("div");
            row.textContent = formatTimestamp(entry.TimestampUtc) + " — " + entry.ItemDisplayName + " — " + entry.Action + " — " + entry.Outcome;
            list.appendChild(row);
          });
          renderPaginationControls("AuditLog", auditLogPage, AUDIT_LOG_PAGE_SIZE, auditLogEntries.length);
        }

        document.addEventListener("pageshow", function (e) {
          if (!e.target.id || e.target.id !== "ArrDeleteSyncManagerPage") return;
          refreshRetryQueue();
          refreshAuditLog();
          loadMoviesTab();
          loadTvTab();
        });

        document.addEventListener("input", function (e) {
          if (e.target.id === "MoviesFilter") {
            moviesPage = 1;
            renderMoviesList(e.target.value);
          }
          if (e.target.id === "TvFilter") {
            tvPage = 1;
            renderTvList(e.target.value);
          }
        });

        document.addEventListener("change", function (e) {
          if (e.target.id === "MoviesPageSize") {
            moviesPageSize = parseInt(e.target.value, 10);
            moviesPage = 1;
            renderMoviesList(document.getElementById("MoviesFilter").value);
          }
          if (e.target.id === "TvPageSize") {
            tvPageSize = parseInt(e.target.value, 10);
            tvPage = 1;
            renderTvList(document.getElementById("TvFilter").value);
          }
        });

        document.addEventListener("click", function (e) {
          if (e.target.id === "MoviesTabButton") {
            currentTab = "movies";
            document.getElementById("MoviesTab").style.display = "block";
            document.getElementById("TvTab").style.display = "none";
            document.getElementById("MoviesTabButton").className = "raised button-submit";
            document.getElementById("TvTabButton").className = "raised";
          }
          if (e.target.id === "TvTabButton") {
            currentTab = "tv";
            document.getElementById("MoviesTab").style.display = "none";
            document.getElementById("TvTab").style.display = "block";
            document.getElementById("TvTabButton").className = "raised button-submit";
            document.getElementById("MoviesTabButton").className = "raised";
          }
          if (e.target.id === "MoviesPrevPage") {
            moviesPage--;
            renderMoviesList(document.getElementById("MoviesFilter").value);
          }
          if (e.target.id === "MoviesNextPage") {
            moviesPage++;
            renderMoviesList(document.getElementById("MoviesFilter").value);
          }
          if (e.target.id === "TvPrevPage") {
            tvPage--;
            renderTvList(document.getElementById("TvFilter").value);
          }
          if (e.target.id === "TvNextPage") {
            tvPage++;
            renderTvList(document.getElementById("TvFilter").value);
          }
          if (e.target.id === "AuditLogPrevPage") {
            auditLogPage--;
            renderAuditLogPage();
          }
          if (e.target.id === "AuditLogNextPage") {
            auditLogPage++;
            renderAuditLogPage();
          }
          if (e.target.id === "DeleteSelectedButton") {
            openBulkConfirm();
          }
          if (e.target.id === "DeleteSafeItemsButton") {
            runDeleteBatch(confirmedSafeItems);
          }
          if (e.target.id === "CancelBulkButton") {
            document.getElementById("BulkConfirmSection").style.display = "none";
          }
        });
      })();
    </script>
  </div>
</body>
</html>
