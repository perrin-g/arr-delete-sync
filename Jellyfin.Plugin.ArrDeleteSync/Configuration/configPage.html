<!DOCTYPE html>
<html>
<head>
  <title>ArrDeleteSync</title>
</head>
<body>
  <div id="ArrDeleteSyncConfigPage" data-role="page" class="page type-interior pluginConfigurationPage">
    <div data-role="content">
      <div class="content-primary">
        <form id="ArrDeleteSyncConfigForm">
          <div class="verticalSection">
            <h2>Radarr</h2>
            <input is="emby-input" type="text" id="RadarrUrl" label="URL" />
            <input is="emby-input" type="password" id="RadarrApiKey" label="API Key" />
            <button is="emby-button" type="button" id="TestRadarr">Test Connection</button>
            <div id="RadarrTestResult"></div>
          </div>
          <div class="verticalSection">
            <h2>Sonarr</h2>
            <input is="emby-input" type="text" id="SonarrUrl" label="URL" />
            <input is="emby-input" type="password" id="SonarrApiKey" label="API Key" />
            <button is="emby-button" type="button" id="TestSonarr">Test Connection</button>
            <div id="SonarrTestResult"></div>
          </div>
          <div class="verticalSection">
            <h2>Seerr</h2>
            <input is="emby-input" type="text" id="SeerrUrl" label="URL" />
            <input is="emby-input" type="password" id="SeerrApiKey" label="API Key" />
            <button is="emby-button" type="button" id="TestSeerr">Test Connection</button>
            <div id="SeerrTestResult"></div>
          </div>
          <div class="verticalSection">
            <h2>Reliability</h2>
            <input is="emby-input" type="number" id="RetryMaxAttempts" label="Max retry attempts" />
            <input is="emby-input" type="number" id="CircuitBreakerThreshold" label="Circuit breaker failure threshold" />
            <button is="emby-button" type="button" id="ResetBreaker">Reset circuit breaker</button>
          </div>
          <button is="emby-button" type="submit" class="raised button-submit block">
            <span>Save</span>
          </button>
        </form>
      </div>
    </div>
  </div>
  <script type="text/javascript">
    (function () {
      var pluginId = "8f2c1e4a-6b3d-4a9e-9c1a-1a2b3c4d5e6f";

      function loadConfig(page) {
        Dashboard.showLoadingMsg();
        ApiClient.getPluginConfiguration(pluginId).then(function (config) {
          page.querySelector("#RadarrUrl").value = config.RadarrUrl || "";
          page.querySelector("#SonarrUrl").value = config.SonarrUrl || "";
          page.querySelector("#SeerrUrl").value = config.SeerrUrl || "";
          page.querySelector("#RetryMaxAttempts").value = config.RetryMaxAttempts || 5;
          page.querySelector("#CircuitBreakerThreshold").value = config.CircuitBreakerThreshold || 5;
          Dashboard.hideLoadingMsg();
        });
      }

      document.addEventListener("pageshow", function (e) {
        var page = e.target.querySelector
          ? e.target
          : document.getElementById("ArrDeleteSyncConfigPage");
        if (page && page.id === "ArrDeleteSyncConfigPage") {
          loadConfig(page);
        }
      });

      document.addEventListener("submit", function (e) {
        var form = e.target;
        if (form.id !== "ArrDeleteSyncConfigForm") return;
        e.preventDefault();

        Dashboard.showLoadingMsg();
        ApiClient.getPluginConfiguration(pluginId).then(function (config) {
          config.RadarrUrl = document.getElementById("RadarrUrl").value;
          config.SonarrUrl = document.getElementById("SonarrUrl").value;
          config.SeerrUrl = document.getElementById("SeerrUrl").value;
          config.RetryMaxAttempts = parseInt(document.getElementById("RetryMaxAttempts").value, 10);
          config.CircuitBreakerThreshold = parseInt(document.getElementById("CircuitBreakerThreshold").value, 10);
          // Plaintext key inputs are sent over the already-authenticated admin API
          // session and encrypted server-side before being written to
          // PluginConfiguration.xml — the browser never sees the encrypted form.
          var radarrKey = document.getElementById("RadarrApiKey").value;
          var sonarrKey = document.getElementById("SonarrApiKey").value;
          var seerrKey = document.getElementById("SeerrApiKey").value;
          if (radarrKey) config.RadarrApiKeyPlaintext = radarrKey;
          if (sonarrKey) config.SonarrApiKeyPlaintext = sonarrKey;
          if (seerrKey) config.SeerrApiKeyPlaintext = seerrKey;

          ApiClient.updatePluginConfiguration(pluginId, config).then(function () {
            Dashboard.processPluginConfigurationUpdateResult();
          });
        });
      });

      document.addEventListener("click", function (e) {
        if (e.target.id === "ResetBreaker") {
          ApiClient.ajax({ type: "POST", url: ApiClient.getUrl("ArrDeleteSync/circuit-breaker/reset") })
            .then(function () { Dashboard.alert("Circuit breaker reset."); });
        }
      });
    })();
  </script>
</body>
</html>
